title: Suspicious PowerShell Encoded Command
id: 5b1f2a3e-4c5d-6e7f-8a9b-0c1d2e3f4a5b
status: experimental
description: Detects PowerShell executions using -EncodedCommand, frequently abused by attackers to obfuscate payloads.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Your Name
date: 2025/06/02
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-Enc '
  condition: selection
falsepositives:
  - Legitimate admin scripts (rare — investigate each)
  - Some software installers (e.g., Chocolatey)
level: high
